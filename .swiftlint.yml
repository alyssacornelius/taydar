included:
  - taydar

excluded:
  - taydar.xcodeproj

cache_path: .build/SwiftLintCache

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - colon
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - redundant_nil_coalescing
  - return_value_from_void_function
  - sorted_first_last
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

analyzer_rules:
  - unused_import

line_length:
  warning: 120
  error: 140
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 250
  error: 350

function_body_length:
  warning: 40
  error: 60

file_length:
  warning: 400
  error: 600

identifier_name:
  min_length:
    warning: 2
  excluded:
    - x
    - y
    - z

reporter: "xcode"
strict: true
